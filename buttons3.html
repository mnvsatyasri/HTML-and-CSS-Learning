<style>
    .subscribe-button{
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        border-radius: 2px;
        padding-left: 16px;
        padding-right: 16px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity,0.15s;
        vertical-align: top;
}
.subscribe-button:hover{
    opacity: 0.8;
}
.subscribe-button:active{
    opacity: 0.5;
}
</style>
<button class="subscribe-button">
    SUBSCRIBE NOW
</button>
